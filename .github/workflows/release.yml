name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Resolve version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore HakedisCheck.sln

      - name: Test
        run: dotnet test HakedisCheck.Tests/HakedisCheck.Tests.csproj --configuration Release

      - name: Publish Win-x64 exe
        run: >
          dotnet publish HakedisCheck.App/HakedisCheck.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ env.RELEASE_VERSION }}
          -o publish/win-x64

      - name: Package assets
        shell: pwsh
        run: |
          Compress-Archive -Path "publish/win-x64/HakedisCheck.exe" -DestinationPath "publish/HakedisCheck-win-x64.zip" -Force

          $hash = Get-FileHash "publish/win-x64/HakedisCheck.exe" -Algorithm SHA256
          $hash.Hash | Out-File -FilePath "publish/HakedisCheck-win-x64.exe.sha256" -Encoding ascii

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: HakedisCheck ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            publish/win-x64/HakedisCheck.exe
            publish/HakedisCheck-win-x64.zip
            publish/HakedisCheck-win-x64.exe.sha256
